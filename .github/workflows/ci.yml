name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  RAG_PROVIDER: mock
  RAG_CACHE_ENABLED: "false"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend and evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/reco-api/requirements-dev.txt
          python -m pip install pandas
      - name: Run backend and evaluation tests
        run: python -m pytest tests services/reco-api/tests -q

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      - name: Run frontend tests
        working-directory: web
        run: npm test -- --run

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
      - name: Build frontend
        working-directory: web
        run: npm run build

  backend-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t movie-reco-api-ci services/reco-api

  frontend-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        run: docker build -t movie-reco-web-ci web
