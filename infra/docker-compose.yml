services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  reco-api:
    build: ../services/reco-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RAG_PROVIDER=${RAG_PROVIDER:-mock}
      - MOVIES_CSV_PATH=/data/ml-latest-small/movies.csv
      - RATINGS_CSV_PATH=/data/ml-latest-small/ratings.csv
      - ONNX_MODEL_PATH=/app/models/ncf.onnx
      - METADATA_PATH=/app/models/metadata.json
      - CANDIDATE_POOL=500
      - CACHE_TTL_SECONDS=300
      - EXPLAIN_TTL_SECONDS=60
      - ALPHA=0.7
    depends_on:
      - redis
    volumes:
      - ../ml-latest-small:/data/ml-latest-small:ro

  web:
    build: ../web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=${PUBLIC_API_BASE:-http://localhost:8000}

volumes:
  redis_data:
