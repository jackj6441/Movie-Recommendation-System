services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  reco-api:
    build: ../services/reco-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - RAG_PROVIDER=${RAG_PROVIDER:-mock}
      # Catalog and serving stats ship inside the image under /app/models, so no
      # raw ratings file or host dataset mount is needed at runtime.
      - MOVIES_CSV_PATH=/app/models/catalog_movies.csv
      - SERVING_STATS_PATH=/app/models/serving_stats.json
      - ONNX_MODEL_PATH=/app/models/ncf.onnx
      - METADATA_PATH=/app/models/metadata.json
      - CANDIDATE_POOL=500
      - CACHE_TTL_SECONDS=300
      - EXPLAIN_TTL_SECONDS=60
      - ALPHA=0.7
    depends_on:
      - redis

  web:
    build: ../web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=${PUBLIC_API_BASE:-http://localhost:8000}

volumes:
  redis_data:
