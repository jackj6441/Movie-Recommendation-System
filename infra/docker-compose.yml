services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  reco-api:
    build: ../services/reco-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  web:
    build: ../web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://localhost:8000

volumes:
  redis_data:
